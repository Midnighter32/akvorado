---
name: CI
on:
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:
jobs:
  build-docker:
    name: 🐋 Build Docker images
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref_type == 'tag'
    permissions:
      contents: read
      packages: write
      attestations: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0        # We need the version
          persist-credentials: false
      - name: Get version
        id: version
        run: |
          echo version=$(make version) >> "$GITHUB_OUTPUT"
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/metadata-action@v6
        id: meta
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index
        with:
          images: |
            ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=unreleased
          labels: |
            org.opencontainers.image.title=Akvorado
            org.opencontainers.image.licenses=AGPL-3.0-only
          annotations: |
            org.opencontainers.image.title=Akvorado
            org.opencontainers.image.licenses=AGPL-3.0-only
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          platforms: >-
            ${{
              github.ref_type == 'tag' &&
              'linux/amd64,linux/amd64/v3,linux/arm64,linux/arm/v7' ||
              'linux/amd64/v3,linux/arm64'
            }}
          push: true
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          provenance: mode=max
    outputs:
      package: ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}
